<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continental - Mesa de Juego</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ===== LAYOUT PRINCIPAL ===== */
        #game { 
            position: fixed; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            z-index: 1; 
        }

        /* ===== BARRA SUPERIOR ===== */
        .topbar { 
            flex-shrink: 0; 
            background: rgba(0,0,0,.5); 
            border-bottom: 1px solid rgba(200,160,69,.12); 
            backdrop-filter: blur(12px); 
            padding: 8px 14px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            flex-wrap: wrap; 
            z-index: 10; 
        }

        .tb-title { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 1.1rem; 
            color: var(--gold); 
            letter-spacing: 2px; 
        }

        /* Marcador de puntuación */
        .scoreboard { 
            display: flex; 
            gap: 10px; 
            margin-left: auto; 
        }

        .sitem { 
            text-align: center; 
        }

        .sname { 
            font-size: .68rem; 
            color: var(--text-dim); 
        }

        .spts { 
            font-size: .9rem; 
            color: var(--gold); 
            font-weight: 600; 
        }

        .sitem.me .sname { 
            color: var(--gold-hi); 
        }

        .sitem.me .spts { 
            color: #fff; 
        }

        /* ===== MESA DE JUEGO ===== */
        .table { 
            flex: 1; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            padding: 10px; 
            position: relative; 
        }

        /* Oponentes */
        .opponents-row { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }

        .opp { 
            background: rgba(0,0,0,.28); 
            border: 1px solid rgba(255,255,255,.07); 
            border-radius: 10px; 
            padding: 8px 12px; 
            text-align: center; 
            transition: border-color .3s, box-shadow .3s; 
            min-width: 90px; 
        }

        .opp.turn { 
            border-color: var(--gold); 
            box-shadow: 0 0 14px rgba(200,160,69,.25); 
        }

        .opp.bajado { 
            border-color: #2a8a4a; 
        }

        .opp-name { 
            font-size: .72rem; 
            color: var(--text-dim); 
            margin-bottom: 5px; 
        }

        .opp-backs { 
            display: flex; 
            gap: 2px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }

        .cback-xs { 
            width: 14px; 
            height: 20px; 
            border-radius: 2px; 
            background: linear-gradient(135deg, #1a3680, #0d2050); 
            border: 1px solid rgba(255,255,255,.15); 
        }

        /* Zona central */
        .center-zone { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 24px; 
            flex: 1; 
        }

        /* Jugadas bajadas */
        .table-bajadas { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: flex-start; 
            max-width: 55%; 
        }

        .bajada-pile { 
            background: rgba(0,0,0,.22); 
            border: 2px solid rgba(255,255,255,.07); 
            border-radius: 10px; 
            padding: 7px 9px; 
            cursor: pointer; 
            transition: border-color .2s, background .2s; 
        }

        .bajada-pile:hover { 
            border-color: rgba(200,160,69,.5); 
            background: rgba(200,160,69,.07); 
        }

        .bajada-pile.drop-target { 
            border-color: #2ecc71; 
            background: rgba(46,204,113,.1); 
            box-shadow: 0 0 12px rgba(46,204,113,.3); 
        }

        .bajada-pile-label { 
            font-size: .6rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 5px; 
        }

        .bajada-pile-cards { 
            display: flex; 
            gap: 3px; 
            flex-wrap: wrap; 
        }

        /* Área de mazo y fondo */
        .deck-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 7px; 
        }

        .deck-label { 
            font-size: .65rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }

        .mazo-wrap { 
            position: relative; 
            width: var(--cw); 
            height: var(--ch); 
            cursor: pointer; 
        }

        .mazo-wrap .cback { 
            position: absolute; 
        }

        .mazo-wrap .cback:nth-child(1) { 
            top: 5px; 
            left: 5px; 
        }

        .mazo-wrap .cback:nth-child(2) { 
            top: 3px; 
            left: 3px; 
        }

        .mazo-wrap .cback:nth-child(3) { 
            top: 0; 
            left: 0; 
        }

        .mazo-count { 
            font-size: .62rem; 
            color: var(--text-dim); 
            text-align: center; 
        }

        /* ===== SECCIÓN DEL JUGADOR ===== */
        .player-section { 
            flex-shrink: 0; 
            border-top: 1px solid rgba(200,160,69,.1); 
            padding-top: 8px; 
        }

        .player-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 4px; 
            margin-bottom: 7px; 
        }

        .player-label { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 1rem; 
            color: var(--gold-hi); 
        }

        .pulse-dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: var(--gold); 
            animation: pulse 1.3s ease-in-out infinite; 
        }

        /* Zona de la mano */
        .hand-zone { 
            display: flex; 
            gap: 6px; 
            align-items: flex-end; 
            min-height: calc(var(--ch) + 18px); 
            padding: 8px 10px; 
            background: rgba(0,0,0,.15); 
            border: 2px dashed rgba(255,255,255,.07); 
            border-radius: 12px; 
            overflow-x: auto; 
            transition: border-color .2s, background .2s; 
            position: relative; 
            scrollbar-width: thin; 
            flex-wrap: nowrap; 
        }

        .hand-zone.drag-over { 
            border-color: var(--gold); 
            background: rgba(200,160,69,.06); 
        }

        .insert-ghost { 
            width: 3px; 
            min-width: 3px; 
            height: calc(var(--ch) - 8px); 
            background: var(--gold); 
            border-radius: 4px; 
            box-shadow: 0 0 8px var(--gold); 
            pointer-events: none; 
            align-self: center; 
            flex-shrink: 0; 
        }

        /* ===== BARRA DE ACCIONES ===== */
        .action-bar { 
            flex-shrink: 0; 
            background: rgba(0,0,0,.45); 
            border-top: 1px solid rgba(200,160,69,.12); 
            backdrop-filter: blur(12px); 
            padding: 9px 12px; 
        }

        .castigo-banner { 
            background: rgba(180,60,30,.15); 
            border: 1px solid rgba(180,60,30,.35); 
            border-radius: 8px; 
            padding: 8px 12px; 
            text-align: center; 
            font-size: .82rem; 
            color: #e88060; 
            margin-bottom: 8px; 
            display: none; 
        }

        .instr { 
            font-size: .78rem; 
            color: var(--gold-hi); 
            padding: 5px 10px; 
            background: rgba(200,160,69,.07); 
            border-left: 3px solid var(--gold); 
            border-radius: 0 6px 6px 0; 
            margin-bottom: 8px; 
        }

        .action-btns { 
            display: flex; 
            gap: 7px; 
            flex-wrap: wrap; 
        }

        .abtn { 
            padding: 9px 16px; 
            border-radius: 8px; 
            border: 1px solid; 
            font-family: 'Outfit', sans-serif; 
            font-size: .82rem; 
            font-weight: 500; 
            cursor: pointer; 
            transition: transform .1s, box-shadow .15s, background .15s; 
            white-space: nowrap; 
        }

        .abtn:hover { 
            transform: translateY(-1px); 
        }

        .abtn:active { 
            transform: none; 
        }

        .abtn:disabled { 
            opacity: .38; 
            cursor: not-allowed; 
            transform: none !important; 
        }

        .abtn-gold {
            background: linear-gradient(135deg, #d4a84a, #8a6018);
            border-color: var(--gold);
            color: #1a0e00;
            font-weight: 700;
            box-shadow: 0 3px 14px rgba(200,160,69,.25);
        }

        .abtn-gold:hover {
            box-shadow: 0 5px 20px rgba(200,160,69,.4);
        }

        .abtn-outline {
            background: rgba(255,255,255,.05);
            border-color: rgba(255,255,255,.2);
            color: var(--text);
        }

        .abtn-outline:hover {
            background: rgba(255,255,255,.1);
        }

        .abtn-green {
            background: rgba(40,180,90,.15);
            border-color: #28b45a;
            color: #4de88a;
        }

        .abtn-green:hover {
            background: rgba(40,180,90,.28);
        }

        .abtn-red {
            background: rgba(180,48,48,.15);
            border-color: var(--red);
            color: var(--red-hi);
        }

        .log-line { 
            font-size: .68rem; 
            color: var(--text-muted); 
            margin-top: 6px; 
            border-top: 1px solid rgba(255,255,255,.05); 
            padding-top: 5px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }

        .turn-tag { 
            font-size: .72rem; 
            color: var(--text-dim); 
            margin-left: auto; 
        }

        /* ===== INTERCAMBIO DE COMODINES ===== */
        .comodin-intercambiable {
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            position: relative;
        }

        .comodin-intercambiable:hover {
            transform: scale(1.1);
            border-color: var(--gold);
            box-shadow: 0 0 15px var(--gold);
        }

        .comodin-intercambiable small {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: black;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 8px;
            white-space: nowrap;
        }

        .bajada-pile.intercambio-mode {
            border-color: var(--gold);
            background: rgba(200,160,69,.1);
        }

        .card.pending-intercambio {
            border: 3px solid var(--gold);
            animation: pulse 1.3s ease-in-out infinite;
        }

        .intercambio-instr {
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            text-align: center;
            color: var(--gold);
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 4px;
            border-radius: 4px;
        }

        /* Tooltip para mostrar valor del comodín */
        .joker-sm {
            position: relative;
        }

        .joker-sm:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="game">
        <div class="topbar">
            <span class="tb-title">Continental</span>
            <span class="pill pill-gold" id="ronda-pill">Ronda 1</span>
            <span class="pill pill-dim" id="req-pill">2 tercias</span>
            <span class="pill pill-dim" id="mode-pill">●</span>
            <div class="scoreboard" id="scoreboard"></div>
        </div>

        <div class="table">
            <div class="opponents-row" id="opponents"></div>
            <div class="center-zone">
                <div class="table-bajadas" id="table-bajadas"></div>
                <div class="deck-area">
                    <div class="deck-label">Mazo</div>
                    <div class="mazo-wrap" id="mazo-wrap">
                        <div class="cback"></div>
                        <div class="cback"></div>
                        <div class="cback" id="mazo-top"></div>
                    </div>
                    <div class="mazo-count" id="mazo-count"></div>
                </div>
                <div class="deck-area">
                    <div class="deck-label">Fondo</div>
                    <div id="fondo-wrap"></div>
                </div>
            </div>
            <div class="player-section">
                <div class="player-header">
                    <div class="player-label">
                        <span class="pulse-dot" id="pulse-dot" style="display:none"></span>
                        <span id="my-name">—</span>
                    </div>
                    <span class="turn-tag" id="turn-tag"></span>
                    <span style="font-size:.72rem;color:var(--text-dim)" id="hand-count"></span>
                </div>
                <div class="hand-zone" id="hand-zone"></div>
            </div>
        </div>

        <div class="action-bar">
            <div class="castigo-banner" id="castigo-banner"></div>
            <div class="instr" id="instr"></div>
            <div class="action-btns" id="action-btns"></div>
            <div class="log-line" id="log-line"></div>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="modal-ronda">
        <div class="modal">
            <h2 id="mr-title"></h2>
            <p id="mr-msg"></p>
            <div class="score-rows" id="mr-scores"></div>
            <div class="modal-btns">
                <button class="btn btn-gold" style="flex:1" id="btn-next-round" onclick="ackRonda()">Siguiente Ronda →</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal-juego">
        <div class="modal">
            <h2>🎉 ¡Juego Terminado!</h2>
            <p>Resultados finales:</p>
            <div class="score-rows" id="mj-scores"></div>
            <div class="modal-btns">
                <button class="btn btn-gold" style="flex:1" onclick="location.href='/'">Nueva Partida</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal-disconnected" style="z-index:250">
        <div class="modal" style="text-align:center">
            <h2>📡 Reconectando</h2>
            <p>Perdiste conexión. Intentando reconectar<span style="animation:dots 1.2s infinite">...</span></p>
        </div>
    </div>

    <div id="toast"></div>

    <!-- Scripts -->
    <script src="js/socket.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
