<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Continental - Mesa de Juego</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
/* ===== LAYOUT PRINCIPAL ===== */
#game {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  z-index: 1;
  /* dvh respeta la barra del navegador móvil; 100vh como fallback */
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: var(--felt-deep);
}

/* ===== TOPBAR ===== */
.topbar {
  flex-shrink: 0;
  height: 44px;
  min-height: 44px;
  background: rgba(0,0,0,.5);
  border-bottom: 1px solid rgba(200,160,69,.12);
  backdrop-filter: blur(12px);
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
  position: relative;
}

.tb-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  color: var(--gold);
  letter-spacing: 2px;
  flex-shrink: 0;
}

/* Scoreboard centrado absolutamente en la topbar */
.scoreboard {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  pointer-events: none;
}

.sitem { text-align: center; }
.sname { font-size: .62rem; color: var(--text-dim); }
.spts  { font-size: .85rem; color: var(--gold); font-weight: 600; }
.sitem.me .sname { color: var(--gold-hi); }
.sitem.me .spts  { color: #fff; }

/* ===== MESA ===== */
.table {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 6px 10px 4px;
  overflow: hidden;
}

/* OPONENTES */
.opponents-row {
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.opp {
  background: rgba(0,0,0,.28);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 8px;
  padding: 5px 10px;
  text-align: center;
  min-width: 80px;
  position: relative;
  overflow: visible !important;
}
.opp.turn   { border-color: var(--gold); box-shadow: 0 0 12px rgba(200,160,69,.25); }
.opp.bajado { border-color: #2a8a4a; }
.opp-name   { font-size: .68rem; color: var(--text-dim); margin-bottom: 4px; }
.opp-backs  { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; }
.cback-xs {
  width: 12px; height: 17px; border-radius: 2px;
  background: linear-gradient(135deg, #1a3680, #0d2050);
  border: 1px solid rgba(255,255,255,.15);
}

/* ===== ZONA CENTRAL ===== */
.center-zone {
  flex: 1 1 0;
  min-height: 60px;
  display: flex;
  align-items: stretch;
  justify-content: center;
  gap: 16px;
  overflow: hidden;
  padding: 0 4px;
}

/* ===== BAJADAS ===== */
.table-bajadas-container {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: auto;
  padding: 8px;
  background: rgba(0,0,0,.1);
  border-radius: 10px;
  scrollbar-width: thin;
  -webkit-overflow-scrolling: touch;
  scrollbar-color: var(--gold-dim) rgba(255,255,255,0.1);
}
.table-bajadas-container::-webkit-scrollbar { width: 6px; height: 6px; }
.table-bajadas-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
.table-bajadas-container::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 10px; }

.table-bajadas {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 4px;
  align-content: flex-start;
}

.bajada-pile {
  background: rgba(0,0,0,.22);
  border: 2px solid rgba(255,255,255,.07);
  border-radius: 8px;
  padding: 5px;
  cursor: pointer;
  display: inline-flex;
  flex-direction: column;
  transition: border-color 0.15s;
}
.bajada-pile:hover { border-color: rgba(200,160,69,.5); }
.bajada-pile-label { font-size: 0.52rem; color: var(--text-muted); text-align: center; margin-bottom: 3px; }
.bajada-pile-cards { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }

/* ===== MAZO Y FONDO ===== */
.deck-area-container {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
  justify-content: center;
  width: 90px;
}
.deck-area { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.deck-label { font-size: 0.58rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

.mazo-wrap {
  position: relative;
  width: var(--cw);
  height: var(--ch);
  cursor: pointer;
  transition: transform 0.15s;
}
.mazo-wrap:hover { transform: translateY(-2px); }
.mazo-wrap .cback { position: absolute; }
.mazo-wrap .cback:nth-child(1) { top: 3px; left: 3px; }
.mazo-wrap .cback:nth-child(2) { top: 2px; left: 2px; }
.mazo-wrap .cback:nth-child(3) { top: 0;   left: 0; }
.mazo-count { font-size: 0.52rem; color: var(--text-dim); }

.deck-clickable-hint {
  font-size: 0.5rem;
  color: var(--gold);
  text-align: center;
  animation: pulse 1.3s ease-in-out infinite;
  letter-spacing: 0.5px;
}

/* ===== SECCIÓN DEL JUGADOR ===== */
.player-section {
  flex-shrink: 0;
  border-top: 1px solid rgba(200,160,69,.12);
  padding: 3px 0 2px;
  background: rgba(0,0,0,.2);
  backdrop-filter: blur(5px);
  z-index: 5;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.player-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 10px;
  font-size: 0.75rem;
  min-height: 20px;
  position: relative;
  overflow: visible !important;
}

.player-label { display: flex; gap: 5px; align-items: center; color: var(--gold-hi); }
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold);
  animation: pulse 1.3s ease-in-out infinite;
  flex-shrink: 0;
}

/* ETIQUETAS DE FILA — CENTRADAS */
.row-label {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 10px;
  font-size: 0.55rem;
  color: var(--gold);
  text-transform: uppercase;
  line-height: 1.2;
}
.row-desc { font-size: 0.5rem; color: var(--text-dim); text-transform: none; }

/* FILA 1: SOBRANTES — CARTAS CENTRADAS */
.discard-zone {
  display: flex;
  gap: 3px;
  align-items: center;
  justify-content: center;
  padding: 2px 10px;
  background: rgba(0,0,0,.15);
  border: 2px dashed rgba(255,255,255,.07);
  border-radius: 6px;
  overflow-x: auto;
  overflow-y: hidden;
  flex-wrap: nowrap;
  height: calc(var(--ch) + 6px);
  min-height: calc(var(--ch) + 6px);
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) transparent;
  box-sizing: border-box;
}

/* FILA 2: CONSTRUCCIÓN */
.building-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  width: 100%;
  max-width: 100%;
  margin: 0 auto;
  padding: 0 10px;
  height: auto;
  min-height: calc(var(--ch) + 28px);
  box-sizing: border-box;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}
.building-row::-webkit-scrollbar { display: none; }

/* SLOTS */
.building-slot {
  flex: 0 1 auto;
  min-width: 120px;
  max-width: 1000px;
  display: flex;
  flex-direction: column;
  background: rgba(0,0,0,.2);
  border: 2px solid rgba(200,160,69,.2);
  border-radius: 6px;
  padding: 3px;
  transition: all 0.2s ease;
  overflow: visible;
}
.building-slot:hover { border-color: var(--gold); background: rgba(200,160,69,.08); }
.building-slot.drop-target { border-color: #2ecc71; background: rgba(46,204,113,.1); }
.building-slot.complete    { border-color: #2ecc71; background: rgba(46,204,113,.08); }
.building-slot.complete .building-slot-title { color: #2ecc71; }

.building-slot-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 1px; padding: 0 2px; font-size: 0.6rem; flex-shrink: 0;
}
.building-slot-title { color: var(--gold); font-weight: 600; text-transform: uppercase; }
.building-slot-count {
  font-size: 0.5rem; color: var(--text-dim);
  background: rgba(0,0,0,.3); padding: 1px 4px; border-radius: 6px;
}
.building-slot-count.valid { color: #2ecc71; background: rgba(46,204,113,.2); }
.building-slot-cards {
  display: flex; gap: 2px; flex-wrap: nowrap;
  align-items: center; justify-content: center;
  padding: 2px; overflow: visible;
  min-height: 52px;
}
.building-slot-cards .insert-ghost {
  width: 4px; min-width: 4px; height: 52px;
  background: #2ecc71; border-radius: 3px;
  pointer-events: none; flex-shrink: 0;
}
.slot-hint {
  font-size: 0.46rem; color: var(--text-muted); text-align: center;
  padding: 1px 2px; border-top: 1px dashed rgba(255,255,255,.08);
  margin-top: 1px; flex-shrink: 0; line-height: 1.2;
}

/* ===== ACTION BAR ===== */
.action-bar {
  flex-shrink: 0;
  background: rgba(12,22,12,.92);
  border-top: 1px solid rgba(200,160,69,.25);
  backdrop-filter: blur(12px);
  padding: 6px 12px 8px;
  /* padding-bottom extra para la barra de gestos de iOS/Android */
  padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  width: 100%;
  z-index: 50;
  box-shadow: 0 -4px 16px rgba(0,0,0,.5);
}

.action-btns {
  display: flex; gap: 8px; flex-wrap: wrap;
  justify-content: center; max-width: 700px; width: 100%;
}

.abtn {
  padding: 8px 16px; border-radius: 24px; border: 1px solid;
  font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: all 0.18s ease; box-shadow: 0 3px 8px rgba(0,0,0,.3);
  text-transform: uppercase; letter-spacing: 0.4px; font-family: 'Outfit', sans-serif;
}
.abtn:hover  { transform: translateY(-2px); }
.abtn:active { transform: none; }
.abtn-gold {
  background: linear-gradient(135deg, #d4a84a, #b87d30);
  border-color: var(--gold-hi); color: #1a0e00;
  text-shadow: 0 1px 2px rgba(255,255,200,.4);
}
.abtn-gold:hover { background: linear-gradient(135deg, #e8c870, #d4a84a); box-shadow: 0 6px 14px rgba(200,160,69,.4); }
.abtn-outline { background: rgba(35,45,35,.85); border-color: var(--gold-dim); color: var(--text); }
.abtn-outline:hover { background: rgba(70,85,60,.9); border-color: var(--gold); color: var(--gold-hi); }
.abtn-green { background: rgba(25,90,45,.9); border-color: #2ecc71; color: #a0ffb0; }
.abtn-green:hover { background: rgba(35,125,65,.95); border-color: #4de88a; }
.abtn-red { background: rgba(120,35,35,.9); border-color: var(--red-hi); color: #ffb0b0; }
.abtn-red:hover { background: rgba(165,55,55,.95); border-color: #ff8080; }
.abtn:disabled { opacity: .28; cursor: not-allowed; transform: none !important; pointer-events: none; }

.instr {
  font-size: 0.75rem; color: var(--gold-hi);
  padding: 5px 14px; background: rgba(0,0,0,.55);
  border-left: 3px solid var(--gold); border-radius: 0 6px 6px 0;
  max-width: 640px; width: 100%; text-align: center; font-weight: 500; line-height: 1.3;
}

.castigo-banner {
  background: rgba(140,50,30,.92); border: 2px solid #ff8040; border-radius: 32px;
  padding: 7px 18px; font-size: 0.85rem; font-weight: 600; color: #ffd0a0;
  max-width: 640px; width: 100%; text-align: center;
  box-shadow: 0 0 18px rgba(255,128,0,.3); animation: pulse-gold 1.5s infinite;
}
@keyframes pulse-gold {
  0%,100% { box-shadow: 0 0 18px rgba(255,128,0,.3); }
  50%      { box-shadow: 0 0 30px rgba(255,160,0,.55); }
}

.log-line {
  font-size: 0.6rem; color: var(--text-muted); max-width: 640px; width: 100%;
  text-align: center; background: rgba(0,0,0,.25); padding: 2px 10px; border-radius: 16px;
}
.turn-tag { font-size: 0.62rem; color: var(--text-dim); }

/* ===== MODALES ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.72); backdrop-filter: blur(5px);
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: linear-gradient(160deg, #1a3d28, #0d1f14);
  border: 1px solid rgba(200,160,69,.22); border-radius: 12px;
  padding: 20px 24px; max-width: 400px; width: 90%;
}
.modal h2 { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 1.2rem; margin-bottom: 8px; }

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  background: rgba(180,50,50,.9); color: #fff; padding: 6px 14px;
  border-radius: 6px; font-size: 0.72rem; z-index: 300; display: none; white-space: nowrap;
}

/* ===== ANIMACIONES ===== */
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.4; transform:scale(.65); }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:none; }
}

/* ================================================================
   CHAT / REACCIONES
   ================================================================ */

#chat-toggle {
  position: fixed;
  right: 14px;
  bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a3d28, #0e2419);
  border: 1px solid rgba(200,160,69,.4);
  color: var(--gold);
  font-size: 1.1rem;
  cursor: pointer;
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(0,0,0,.5);
  transition: transform 0.2s, box-shadow 0.2s;
}
#chat-toggle:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(200,160,69,.3); }

#chat-panel {
  position: fixed;
  right: 14px;
  bottom: calc(130px + env(safe-area-inset-bottom, 0px));
  width: 240px;
  background: linear-gradient(160deg, rgba(14,36,25,.97), rgba(8,20,14,.97));
  border: 1px solid rgba(200,160,69,.22);
  border-radius: 14px;
  z-index: 99;
  display: none;
  flex-direction: column;
  box-shadow: 0 12px 40px rgba(0,0,0,.65);
  overflow: hidden;
  animation: fadeUp 0.22s var(--eout) both;
}
#chat-panel.open { display: flex; }

.chat-header {
  padding: 8px 12px;
  font-size: 0.7rem; color: var(--gold); font-weight: 600;
  border-bottom: 1px solid rgba(200,160,69,.12);
  text-transform: uppercase; letter-spacing: 1px;
}

.chat-messages {
  max-height: 130px;
  overflow-y: auto;
  padding: 6px 10px;
  display: flex; flex-direction: column; gap: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) transparent;
}
.chat-msg {
  font-size: 0.67rem; line-height: 1.3;
  padding: 3px 7px; border-radius: 7px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.06);
  animation: fadeUp 0.18s var(--eout) both;
}
.chat-msg .msg-author { color: var(--gold-hi); font-weight: 600; margin-right: 4px; }
.chat-msg .msg-text   { color: var(--text); }

.chat-section-label {
  font-size: 0.52rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 5px 12px 2px;
}

.chat-emojis {
  display: flex; gap: 5px; padding: 4px 10px 6px;
  flex-wrap: wrap; justify-content: center;
}
.chat-emoji-btn {
  font-size: 1.2rem; cursor: pointer;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px; width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.15s;
}
.chat-emoji-btn:hover  { transform: scale(1.2); background: rgba(200,160,69,.15); border-color: rgba(200,160,69,.3); }
.chat-emoji-btn:active { transform: scale(.88); }

.chat-quick-msgs {
  display: flex; flex-direction: column; gap: 3px;
  padding: 4px 10px 10px;
  border-top: 1px solid rgba(255,255,255,.06);
  max-height: 170px; overflow-y: auto; scrollbar-width: thin;
}
.chat-quick-btn {
  font-size: 0.67rem; color: var(--text);
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 6px; padding: 5px 8px;
  cursor: pointer; text-align: left;
  transition: background 0.15s, border-color 0.15s;
  font-family: 'Outfit', sans-serif; line-height: 1.2;
}
.chat-quick-btn:hover { background: rgba(200,160,69,.12); border-color: rgba(200,160,69,.3); color: var(--gold-hi); }

/* Botón especial: ¡¡¡PAGA!!! */
.chat-quick-btn.golpe {
  border-color: rgba(184,48,48,.5);
  color: #fff;
  background: linear-gradient(135deg, rgba(160,30,30,.85), rgba(100,15,15,.85));
  font-weight: 700; font-size: 0.78rem;
  letter-spacing: 1px; text-align: center; text-transform: uppercase;
  box-shadow: 0 0 10px rgba(224,64,64,.25);
}
.chat-quick-btn.golpe:hover {
  background: linear-gradient(135deg, rgba(200,40,40,.95), rgba(140,20,20,.95));
  border-color: var(--red-hi);
  box-shadow: 0 0 18px rgba(224,64,64,.5);
  transform: scale(1.02);
}

/* Emoji flotante */
.reaction-float {
  position: fixed; z-index: 9990; pointer-events: none;
  font-size: 1.8rem; line-height: 1;
  animation: reactionPop 2.2s var(--spring) forwards;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
}
@keyframes reactionPop {
  0%   { opacity:0; transform:scale(.3) translateY(0); }
  15%  { opacity:1; transform:scale(1.25) translateY(-10px); }
  35%  { transform:scale(1) translateY(-5px); }
  70%  { opacity:1; transform:scale(1) translateY(-22px); }
  100% { opacity:0; transform:scale(.8) translateY(-55px); }
}

/* ── Globito de diálogo ── */
.bubble-anchor {
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  pointer-events: none;
  z-index: 80;
}

.speech-bubble {
  position: absolute;
  bottom: calc(100% + 8px);
  top: auto;
  left: 50%;
  transform: translateX(-50%) scale(.85);
  background: rgba(8,24,14,.96);
  border: 1.5px solid rgba(200,160,69,.4);
  border-radius: 10px;
  padding: 6px 11px;
  font-size: 0.72rem; color: #e8e8e0;
  white-space: normal; max-width: 160px; min-width: 60px;
  text-align: center; pointer-events: none;
  box-shadow: 0 4px 18px rgba(0,0,0,.65);
  opacity: 0;
  transition: opacity .18s ease, transform .22s cubic-bezier(.34,1.56,.64,1);
  line-height: 1.35; word-break: break-word;
  z-index: 80;
}

/* Triangulito apuntando ABAJO (hacia el jugador) */
.speech-bubble::before {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-top-color: rgba(200,160,69,.4);
}
.speech-bubble::after {
  content: '';
  position: absolute;
  top: calc(100% - 1px); left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: rgba(8,24,14,.96);
  z-index: 1;
}

.speech-bubble.visible {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

/* Globito especial ¡¡¡PAGA!!! */
.speech-bubble.paga {
  border-color: rgba(220,60,60,.7);
  background: rgba(60,8,8,.97);
  color: #ff9090; font-weight: 800; font-size: 0.82rem; letter-spacing: .5px;
  box-shadow: 0 0 20px rgba(220,60,60,.4), 0 4px 18px rgba(0,0,0,.65);
}
.speech-bubble.paga::before { border-bottom-color: rgba(220,60,60,.7); }
.speech-bubble.paga::after  { border-bottom-color: rgba(60,8,8,.97); }

/* Golpe de mesa */
@keyframes tableBang {
  0%   { transform:translate(0,0) rotate(0deg); }
  10%  { transform:translate(-3px,-3px) rotate(-.5deg); }
  20%  { transform:translate(4px,2px) rotate(.5deg); }
  30%  { transform:translate(-4px,1px) rotate(-.4deg); }
  40%  { transform:translate(4px,-2px) rotate(.4deg); }
  50%  { transform:translate(-3px,3px) rotate(-.3deg); }
  60%  { transform:translate(3px,-2px) rotate(.3deg); }
  70%  { transform:translate(-2px,1px) rotate(-.15deg); }
  85%  { transform:translate(2px,-1px) rotate(.1deg); }
  100% { transform:translate(0,0) rotate(0deg); }
}

<div id="game">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="tb-title">Continental</span>
    <span class="pill pill-gold" id="ronda-pill">Ronda 1</span>

    <span class="pill pill-dim"  id="mode-pill">●</span>

  </div>

  <!-- MESA -->
  <div class="table" id="main-table">

    <!-- Fila de oponentes -->
    <div class="opponents-row" id="opponents"></div>

    <!-- Zona central: bajadas + mazo/fondo -->
    <div class="center-zone">

      <div class="table-bajadas-container">

      </div>

      <div class="deck-area-container">

        <div class="deck-area">
          <div class="deck-label">Mazo</div>

            <div class="cback"></div>

          </div>
          <div class="mazo-count" id="mazo-count"></div>

        </div>

        <div class="deck-area">
          <div class="deck-label">Fondo</div>
          <div id="fondo-wrap"></div>
          <div class="deck-clickable-hint" id="fondo-hint" style="display:none">▲ TOMAR</div>

      </div>
    </div><!-- /center-zone -->

    <!-- Sección del jugador propio -->
    <div class="player-section">

      <div class="player-header">
        <div class="player-label">
          <span class="pulse-dot" id="pulse-dot" style="display:none"></span>
          <span id="my-name">—</span>
        </div>
        <span class="turn-tag"  id="turn-tag"></span>
        <span id="hand-count"></span>
        <!-- Anchor para el globito de diálogo propio -->

        <span>🔨 CONSTRUCCIÓN</span>

      </div>

    </div><!-- /player-section -->

      <div class="instr"        id="instr"></div>

  </div><!-- /table -->

  <!-- ===== CHAT / REACCIONES ===== -->
  <button id="chat-toggle" onclick="toggleChat()" title="Reacciones y mensajes">💬</button>

  <div id="chat-panel">
    <div class="chat-header">💬 Reacciones</div>
    <div class="chat-messages" id="chat-messages"></div>

    <div class="chat-section-label">Emojis</div>
    <div class="chat-emojis">
      <div class="chat-emoji-btn" onclick="sendReaction('emoji','😂')" title="Risa">😂</div>
      <div class="chat-emoji-btn" onclick="sendReaction('emoji','😤')" title="Frustración">😤</div>
      <div class="chat-emoji-btn" onclick="sendReaction('emoji','😢')" title="Tristeza">😢</div>
      <div class="chat-emoji-btn" onclick="sendReaction('emoji','😱')" title="Sorpresa">😱</div>
      <div class="chat-emoji-btn" onclick="sendReaction('emoji','🥳')" title="Celebración">🥳</div>
      <div class="chat-emoji-btn" onclick="sendReaction('emoji','🤬')" title="Enojo">🤬</div>
    </div>

    <div class="chat-section-label">Mensajes rápidos</div>

      <button class="chat-quick-btn" onclick="sendReaction('msg','¡Ya dame mi carta! 😩')">¡Ya dame mi carta! 😩</button>
      <button class="chat-quick-btn" onclick="sendReaction('msg','¡Castígate! 😈')">¡Castígate! 😈</button>
      <button class="chat-quick-btn" onclick="sendReaction('msg','¡Ya gané, jaja! 🏆')">¡Ya gané, jaja! 🏆</button>
      <button class="chat-quick-btn" onclick="sendReaction('msg','¡Qué mala suerte! 😭')">¡Qué mala suerte! 😭</button>
      <button class="chat-quick-btn" onclick="sendReaction('msg','¡Buena jugada! 👏')">¡Buena jugada! 👏</button>
      <button class="chat-quick-btn" onclick="sendReaction('msg','¡No mames! 😤')">¡No mames! 😤</button>

<!-- ===== SCRIPTS ===== -->
<script src="js/socket.js"></script>
<script src="js/animations.js"></script>
<script src="js/dragdrop.js"></script>

<script>
/* ================================================================
   CHAT / REACCIONES — lógica cliente
   Mensaje WS: { type:'reaction', tipo:'emoji'|'msg'|'golpe', texto, nombre }
   ================================================================ */
(function () {
  'use strict';

  const BUBBLE_DURATION = 3800; // ms que se muestra el globito

  /* ── Toggle panel ── */
  window.toggleChat = function () {
    const panel = document.getElementById('chat-panel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      document.getElementById('chat-toggle').textContent = '💬';
    }
  };

  /* Cerrar al click fuera */
  document.addEventListener('click', (e) => {
    const panel  = document.getElementById('chat-panel');
    const toggle = document.getElementById('chat-toggle');
    if (panel.classList.contains('open') &&
        !panel.contains(e.target) &&
        e.target !== toggle && !toggle.contains(e.target)) {
      panel.classList.remove('open');
    }
  });

  /* ── Enviar reacción ── */
  window.sendReaction = function (tipo, texto) {
    if (typeof G === 'undefined' || !G) return;
    const nombre = G.jugadores[myIdx]?.nombre || 'Yo';
    WS.send({ type: 'reaction', tipo, texto, nombre });
    showReaction({ tipo, texto, nombre });
    document.getElementById('chat-panel').classList.remove('open');
  };

  /* ── Recibir reacciones del servidor ── */
  WS.on('reaction', (msg) => {
    if (typeof G !== 'undefined' && G &&
        G.jugadores[myIdx]?.nombre === msg.nombre) return;
    showReaction(msg);
  });

  /* ── Dispatcher principal ── */
  function showReaction ({ tipo, texto, nombre }) {
    appendChatMessage(nombre, texto);
    if (tipo === 'golpe') {
      triggerPaga(nombre);
    } else {
      showSpeechBubble(nombre, texto);
    }
  }

  /* ─────────────────────────────────────────────
     GLOBITO DE DIÁLOGO
  ───────────────────────────────────────────── */
  function showSpeechBubble (nombre, texto, esPaga) {
    const anchorEl = getOrCreateBubbleAnchor(nombre);
    if (!anchorEl) return;

    let bubble = anchorEl.querySelector('.speech-bubble');
    if (!bubble) {
      bubble = document.createElement('div');
      bubble.className = 'speech-bubble';
      anchorEl.appendChild(bubble);
    }

    bubble.textContent = texto;
    bubble.classList.toggle('paga', !!esPaga);

    bubble.classList.remove('visible');
    void bubble.offsetWidth;
    bubble.classList.add('visible');

    clearTimeout(bubble._hideT);
    bubble._hideT = setTimeout(() => {
      bubble.classList.remove('visible');
    }, esPaga ? 3000 : BUBBLE_DURATION);
  }

  function getOrCreateBubbleAnchor (nombre) {
    if (typeof G === 'undefined' || !G) return null;
    const idx = G.jugadores.findIndex(j => j.nombre === nombre);
    if (idx === myIdx) {
      return document.getElementById('my-bubble-anchor');
    }
    const oppEl = document.querySelector(`.opp[data-idx="${idx}"]`);
    if (!oppEl) return null;
    let anchor = oppEl.querySelector('.bubble-anchor');
    if (!anchor) {
      anchor = document.createElement('div');
      anchor.className = 'bubble-anchor';
      oppEl.appendChild(anchor);
    }
    return anchor;
  }

  /* ── Log del panel ── */
  function appendChatMessage (nombre, texto) {
    const container = document.getElementById('chat-messages');
    if (!container) return;
    const div = document.createElement('div');
    div.className = 'chat-msg';
    div.innerHTML =
      `<span class="msg-author">${esc(nombre)}:</span>` +
      `<span class="msg-text">${esc(texto)}</span>`;
    container.appendChild(div);
    while (container.children.length > 30) container.removeChild(container.firstChild);
    container.scrollTop = container.scrollHeight;

    const panel  = document.getElementById('chat-panel');
    const toggle = document.getElementById('chat-toggle');
    if (!panel.classList.contains('open')) {
      toggle.textContent = '💬🔴';
      clearTimeout(toggle._badgeT);
      toggle._badgeT = setTimeout(() => { toggle.textContent = '💬'; }, 5000);
    }
  }

  /* ── ¡¡¡PAGA!!! ── */
  function triggerPaga (nombre) {
    const table = document.getElementById('main-table');
    if (table) {
      table.classList.remove('table-bang');
      void table.offsetWidth;
      table.classList.add('table-bang');
      setTimeout(() => table.classList.remove('table-bang'), 580);
    }
    showSpeechBubble(nombre, '🔥 ¡¡¡PAGA!!!', true);
  }

  /* ── Sanitizar ── */
  function esc (str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

})();
</script>
