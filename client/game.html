<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Continental - Mesa de Juego</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
/* ===== LAYOUT PRINCIPAL MEJORADO ===== */
#game {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  z-index: 1;
  height: 100vh;
  overflow: hidden;
  background: var(--felt-deep);
}

/* ===== TOPBAR (altura fija) ===== */
.topbar {
  flex-shrink: 0;
  height: 60px;
  min-height: 60px;
  background: rgba(0,0,0,.5);
  border-bottom: 1px solid rgba(200,160,69,.12);
  backdrop-filter: blur(12px);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  z-index: 10;
}

@media (max-width: 767px) {
  .topbar {
    height: auto;
    min-height: 50px;
    padding: 5px 10px;
  }
}

.tb-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  color: var(--gold);
  letter-spacing: 2px;
}

@media (max-width: 575px) {
  .tb-title {
    width: 100%;
    text-align: center;
    margin-bottom: 3px;
    font-size: 1rem;
  }
}

/* SCOREBOARD */
.scoreboard {
  display: flex;
  gap: 10px;
  margin-left: auto;
}

@media (max-width: 575px) {
  .scoreboard {
    margin-left: 0;
    width: 100%;
    justify-content: center;
    gap: 8px;
  }
}

.sitem { text-align: center; }
.sname { font-size: .68rem; color: var(--text-dim); }
.spts  { font-size: .9rem; color: var(--gold); font-weight: 600; }

.sitem.me .sname { color: var(--gold-hi); }
.sitem.me .spts  { color: #fff; }

/* ===== MESA (ocupa espacio restante) ===== */
.table {
  flex: 1;
  min-height: 0; /* IMPORTANTE: permite que el contenido se encoja */
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px;
  overflow: hidden;
}

/* OPONENTES (altura automática) */
.opponents-row {
  flex-shrink: 0;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 5px 0;
}

.opp {
  background: rgba(0,0,0,.28);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 10px;
  padding: 8px 12px;
  text-align: center;
  transition: border-color .3s, box-shadow .3s;
  min-width: 90px;
}

.opp.turn {
  border-color: var(--gold);
  box-shadow: 0 0 14px rgba(200,160,69,.25);
}

.opp.bajado { border-color: #2a8a4a; }

.opp-name {
  font-size: .72rem;
  color: var(--text-dim);
  margin-bottom: 5px;
}

.opp-backs {
  display: flex;
  gap: 2px;
  justify-content: center;
  flex-wrap: wrap;
}

.cback-xs {
  width: 14px;
  height: 20px;
  border-radius: 2px;
  background: linear-gradient(135deg,#1a3680,#0d2050);
  border: 1px solid rgba(255,255,255,.15);
}

@media (max-width: 767px) {
  .opp {
    min-width: 70px;
    padding: 5px 8px;
  }
  .opp-name { font-size: 0.65rem; }
  .cback-xs {
    width: 10px;
    height: 15px;
  }
}

@media (max-width: 575px) {
  .opp {
    min-width: 60px;
    padding: 4px 5px;
  }
  .opp-name { font-size: 0.6rem; }
}

/* ===== ZONA CENTRAL CON SCROLL ===== */
.center-zone {
  flex: 1;
  min-height: 0; /* Permite que se encoja */
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 24px;
  overflow: hidden;
  padding: 0 10px;
}

@media (max-width: 767px) {
  .center-zone {
    flex-direction: column;
    gap: 12px;
  }
}

/* ===== CONTENEDOR CON SCROLL PARA LAS BAJADAS ===== */
.table-bajadas-container {
  flex: 1;
  height: 100%;
  overflow-y: auto;
  overflow-x: auto;
  padding: 10px;
  background: rgba(0,0,0,.1);
  border-radius: 12px;
  
  /* Scroll personalizado */
  scrollbar-width: thin;
  -webkit-overflow-scrolling: touch;
  scrollbar-color: var(--gold-dim) rgba(255,255,255,0.1);
}

.table-bajadas-container::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

.table-bajadas-container::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

.table-bajadas-container::-webkit-scrollbar-thumb {
  background: var(--gold-dim);
  border-radius: 10px;
}

.table-bajadas-container::-webkit-scrollbar-thumb:hover {
  background: var(--gold);
}

/* ===== BAJADAS (con grid automático) ===== */
.table-bajadas {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
  padding: 5px;
  min-width: min-content;
}

@media (max-width: 991px) {
  .table-bajadas {
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
  }
}

@media (max-width: 767px) {
  .table-bajadas {
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }
}

@media (max-width: 575px) {
  .table-bajadas {
    grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
    gap: 8px;
  }
}

.bajada-pile {
  background: rgba(0,0,0,.22);
  border: 2px solid rgba(255,255,255,.07);
  border-radius: 10px;
  padding: 7px 9px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  display: inline-flex;
  flex-direction: column;
  min-width: 120px;
}

.bajada-pile:hover {
  border-color: rgba(200,160,69,.5);
  background: rgba(200,160,69,.07);
}

.bajada-pile.drop-target {
  border-color: #2ecc71;
  background: rgba(46,204,113,.1);
  box-shadow: 0 0 12px rgba(46,204,113,.3);
}

.bajada-pile-label {
  font-size: .6rem;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 5px;
  text-align: center;
  letter-spacing: 1px;
}

.bajada-pile-cards {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  justify-content: center;
}

@media (max-width: 767px) {
  .bajada-pile {
    min-width: 100px;
    padding: 5px;
  }
}

@media (max-width: 575px) {
  .bajada-pile {
    min-width: 80px;
    padding: 4px;
  }
  .bajada-pile-label {
    font-size: 0.5rem;
  }
}

/* ===== ÁREA DE MAZO Y FONDO (fijo) ===== */
.deck-area-container {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 120px;
}

@media (max-width: 991px) {
  .deck-area-container {
    width: 100px;
  }
}

@media (max-width: 767px) {
  .deck-area-container {
    width: 80px;
    gap: 10px;
    flex-direction: row;
    justify-content: center;
  }
}

.deck-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
}

.deck-label {
  font-size: .65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.mazo-wrap {
  position: relative;
  width: var(--cw);
  height: var(--ch);
  cursor: pointer;
}

.mazo-wrap .cback {
  position: absolute;
  transition: transform 0.2s;
}

.mazo-wrap .cback:nth-child(1) { top:5px; left:5px; }
.mazo-wrap .cback:nth-child(2) { top:3px; left:3px; }
.mazo-wrap .cback:nth-child(3) { top:0; left:0; }

.mazo-count {
  font-size: .62rem;
  color: var(--text-dim);
  text-align: center;
}

#fondo-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: calc(var(--ch) + 5px);
}

/* ===== SECCIÓN DEL JUGADOR (altura fija, SIEMPRE visible) ===== */
.player-section {
  flex-shrink: 0;
  height: 160px;
  min-height: 160px;
  border-top: 1px solid rgba(200,160,69,.1);
  padding: 8px 0;
  background: rgba(0,0,0,.2);
  backdrop-filter: blur(5px);
  z-index: 5;
  width: 100%;
  display: flex;
  flex-direction: column;
}

@media (max-width: 991px) {
  .player-section {
    height: 140px;
    min-height: 140px;
  }
}

@media (max-width: 767px) {
  .player-section {
    height: 120px;
    min-height: 120px;
    padding: 5px 0;
  }
}

@media (max-width: 575px) {
  .player-section {
    height: 110px;
    min-height: 110px;
  }
}

.player-header {
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 800px;
  margin: 0 auto 5px;
  padding: 0 15px;
}

.player-label {
  display: flex;
  gap: 8px;
  align-items: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  color: var(--gold-hi);
}

#hand-count {
  font-size: .72rem;
  color: var(--text-dim);
}

/* ===== MANO DEL JUGADOR CON SCROLL HORIZONTAL ===== */
.hand-zone {
  flex: 1;
  min-height: 0;
  display: flex;
  gap: var(--hand-gap, 6px);
  align-items: flex-end;
  padding: var(--hand-padding, 5px 15px);
  background: rgba(0,0,0,.15);
  border: 2px dashed rgba(255,255,255,.07);
  border-radius: 12px;
  overflow-x: auto;
  overflow-y: hidden;
  flex-wrap: nowrap;
  width: 100%;
  
  /* Scroll suave en iOS */
  -webkit-overflow-scrolling: touch;
  
  /* Personalización del scrollbar */
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) rgba(255,255,255,0.1);
}

.hand-zone::-webkit-scrollbar {
  height: 6px;
}

.hand-zone::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}

.hand-zone::-webkit-scrollbar-thumb {
  background: var(--gold-dim);
  border-radius: 10px;
}

.hand-zone::-webkit-scrollbar-thumb:hover {
  background: var(--gold);
}

/* Ajustes para el indicador de inserción al arrastrar */
.insert-ghost {
  width: 3px;
  min-width: 3px;
  height: calc(var(--ch) - 8px);
  background: var(--gold);
  border-radius: 4px;
  box-shadow: 0 0 8px var(--gold);
  pointer-events: none;
  align-self: center;
  flex-shrink: 0;
}

/* ===== NUEVAS ZONAS DE CONSTRUCCIÓN ===== */
.hand-zone-container {
  width: 100%;
  margin-bottom: 8px;
  padding: 0 15px;
}

.hand-zone-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  font-size: 0.8rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.hand-zone-label span:first-child {
  color: var(--gold);
  font-weight: 600;
}

.hand-zone-desc {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: none;
}

/* Zona de descarte */
.discard-zone {
  display: flex;
  gap: var(--hand-gap, 6px);
  align-items: flex-end;
  padding: var(--hand-padding, 5px 15px);
  background: rgba(0,0,0,.15);
  border: 2px dashed rgba(255,255,255,.07);
  border-radius: 12px;
  overflow-x: auto;
  overflow-y: hidden;
  flex-wrap: nowrap;
  min-height: calc(var(--ch) + 10px);
  
  /* Scroll suave */
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--text-muted) rgba(255,255,255,0.1);
}

/* Zonas de construcción (contenedor flexible) */
.building-zones {
  display: flex;
  gap: 15px;
  width: 100%;
  min-height: calc(var(--ch) + 20px);
}

.building-slot {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: rgba(0,0,0,.2);
  border: 2px solid rgba(200,160,69,.2);
  border-radius: 12px;
  padding: 8px;
  transition: all 0.2s ease;
}

.building-slot:hover {
  border-color: var(--gold);
  background: rgba(200,160,69,.1);
}

.building-slot.drop-target {
  border-color: #2ecc71;
  background: rgba(46,204,113,.1);
  box-shadow: 0 0 12px rgba(46,204,113,.3);
}

.building-slot-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.75rem;
}

.building-slot-title {
  color: var(--gold);
  font-weight: 600;
  text-transform: uppercase;
}

.building-slot-count {
  color: var(--text-dim);
  font-size: 0.7rem;
  background: rgba(0,0,0,.3);
  padding: 2px 6px;
  border-radius: 10px;
}

.building-slot-cards {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: flex-end;
  min-height: calc(var(--ch) - 10px);
}

/* Estilo especial para el slot cuando está completo */
.building-slot.complete {
  border-color: #2ecc71;
  background: rgba(46,204,113,.1);
}

.building-slot.complete .building-slot-title {
  color: #2ecc71;
}

/* Ajustes responsive */
@media (max-width: 991px) {
  .building-zones {
    gap: 10px;
  }
  
  .building-slot {
    padding: 5px;
  }
  
  .building-slot-header {
    font-size: 0.7rem;
  }
}

@media (max-width: 767px) {
  .hand-zone-container {
    padding: 0 10px;
  }
  
  .building-zones {
    flex-direction: column;
    gap: 8px;
  }
  
  .building-slot-cards {
    min-height: calc(var(--ch) - 5px);
  }
  
  .hand-zone-label {
    font-size: 0.7rem;
  }
  
  .hand-zone-desc {
    font-size: 0.65rem;
  }
}

@media (max-width: 575px) {
  .building-slot-header {
    font-size: 0.65rem;
  }
  
  .building-slot-count {
    font-size: 0.6rem;
    padding: 1px 4px;
  }
}

/* ===== BARRA DE ACCIONES (altura fija) ===== */
.action-bar {
  flex-shrink: 0;
  height: auto;
  min-height: 90px;
  background: rgba(0,0,0,.45);
  border-top: 1px solid rgba(200,160,69,.12);
  backdrop-filter: blur(12px);
  padding: 9px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  z-index: 5;
}

@media (max-width: 767px) {
  .action-bar {
    min-height: 80px;
    padding: 5px 8px;
  }
}

@media (max-width: 575px) {
  .action-bar {
    min-height: 70px;
  }
}

.castigo-banner {
  background: rgba(180,60,30,.15);
  border: 1px solid rgba(180,60,30,.35);
  border-radius: 8px;
  padding: 8px 12px;
  text-align: center;
  font-size: .82rem;
  color: #e88060;
  margin-bottom: 8px;
  display: none;
  max-width: 600px;
  width: 100%;
}

.instr {
  font-size: .78rem;
  color: var(--gold-hi);
  padding: 5px 10px;
  background: rgba(200,160,69,.07);
  border-left: 3px solid var(--gold);
  border-radius: 0 6px 6px 0;
  margin-bottom: 8px;
  max-width: 600px;
  width: 100%;
  text-align: center;
}

.action-btns {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 800px;
  width: 100%;
}

.log-line {
  font-size: .68rem;
  color: var(--text-muted);
  margin-top: 6px;
  border-top: 1px solid rgba(255,255,255,.05);
  padding-top: 5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 600px;
  width: 100%;
  text-align: center;
}

/* ===== ESTILOS PARA INTERCAMBIO DE COMODINES ===== */
.comodin-intercambiable {
  cursor: pointer;
  transition: all 0.2s ease;
  border: 2px solid transparent;
  position: relative;
}

.comodin-intercambiable:hover {
  transform: scale(1.1);
  border-color: var(--gold);
  box-shadow: 0 0 15px var(--gold);
  z-index: 10;
}

.comodin-intercambiable small {
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gold);
  color: black;
  padding: 2px 4px;
  border-radius: 4px;
  font-size: 8px;
  white-space: nowrap;
}

@media (max-width: 767px) {
  .comodin-intercambiable small {
    font-size: 6px;
    padding: 1px 2px;
    bottom: -10px;
  }
}

.bajada-pile.intercambio-mode {
  border-color: var(--gold);
  background: rgba(200,160,69,.1);
}

.card.pending-intercambio {
  border: 3px solid var(--gold);
  animation: pulse 1.3s ease-in-out infinite;
}

.intercambio-instr {
  position: absolute;
  top: -30px;
  left: 0;
  right: 0;
  text-align: center;
  color: var(--gold);
  font-size: 0.8rem;
  background: rgba(0,0,0,0.5);
  padding: 4px;
  border-radius: 4px;
}

@media (max-width: 767px) {
  .intercambio-instr {
    font-size: 0.7rem;
    top: -25px;
    padding: 3px;
  }
}

/* ===== ANIMACIONES ===== */
.pulse-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse 1.3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.65); }
}

/* ===== MODALES ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: blur(5px);
  align-items: center;
  justify-content: center;
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background: linear-gradient(160deg, #1a3d28, #0d1f14);
  border: 1px solid rgba(200, 160, 69, 0.22);
  border-radius: 18px;
  padding: 28px 32px;
  max-width: 460px;
  width: 90%;
  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.65);
  animation: fadeUp 0.4s var(--spring) both;
}

.modal h2 {
  font-family: 'Cormorant Garamond', serif;
  color: var(--gold);
  font-size: 1.4rem;
  margin-bottom: 10px;
}

.modal p {
  color: var(--text-dim);
  font-size: 0.88rem;
  line-height: 1.6;
  margin-bottom: 16px;
}

.score-rows {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 20px;
}

.srow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0, 0, 0, 0.25);
  border-radius: 8px;
  padding: 9px 13px;
}

.srow.winner {
  background: rgba(200, 160, 69, 0.13);
  border: 1px solid rgba(200, 160, 69, 0.28);
}

.srow-pts {
  color: var(--gold);
  font-weight: 700;
}

.modal-btns {
  display: flex;
  gap: 10px;
}

/* ===== TOAST ===== */
#toast {
  position: fixed;
  bottom: 72px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(180, 50, 50, 0.9);
  color: #fff;
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 0.82rem;
  z-index: 300;
  display: none;
  white-space: nowrap;
  box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
  animation: toastIn 0.25s var(--spring);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: none; }
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
}

/* ===== UTILIDADES ===== */
.turn-tag {
  font-size: .72rem;
  color: var(--text-dim);
  margin-left: auto;
}
  </style>
</head>

<body>
<div id="game">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="tb-title">Continental</span>
    <span class="pill pill-gold" id="ronda-pill">Ronda 1</span>
    <span class="pill pill-dim" id="req-pill">2 tercias</span>
    <span class="pill pill-dim" id="mode-pill">●</span>
    <div class="scoreboard" id="scoreboard"></div>
  </div>

  <!-- MESA -->
  <div class="table">

    <!-- Oponentes -->
    <div class="opponents-row" id="opponents"></div>

    <!-- Zona central con scroll para bajadas -->
    <div class="center-zone">
      <!-- Contenedor con scroll para las bajadas -->
      <div class="table-bajadas-container">
        <div class="table-bajadas" id="table-bajadas"></div>
      </div>
      
      <!-- Área de mazo y fondo (fija) -->
      <div class="deck-area-container">
        <div class="deck-area">
          <div class="deck-label">Mazo</div>
          <div class="mazo-wrap" id="mazo-wrap">
            <div class="cback"></div>
            <div class="cback"></div>
            <div class="cback" id="mazo-top"></div>
          </div>
          <div class="mazo-count" id="mazo-count"></div>
        </div>
        
        <div class="deck-area">
          <div class="deck-label">Fondo</div>
          <div id="fondo-wrap"></div>
        </div>
      </div>
    </div>

    <!-- JUGADOR (con zonas de construcción) -->
<div class="player-section">
  <div class="player-header">
    <div class="player-label">
      <span class="pulse-dot" id="pulse-dot" style="display:none"></span>
      <span id="my-name">—</span>
    </div>
    <span class="turn-tag" id="turn-tag"></span>
    <span id="hand-count"></span>
  </div>
  
  <!-- ZONA SUPERIOR: Sobrantes / Descarte -->
  <div class="hand-zone-container">
    <div class="hand-zone-label">
      <span>📦 Sobrantes</span>
      <span class="hand-zone-desc">Cartas que no usarás en jugadas</span>
    </div>
    <div class="hand-zone discard-zone" id="discard-zone"></div>
  </div>
  
  <!-- ZONA INFERIOR: Construcción de jugadas (dinámica según ronda) -->
  <div class="hand-zone-container">
    <div class="hand-zone-label">
      <span>🔨 Construyendo jugadas</span>
      <span class="hand-zone-desc" id="building-requirement"></span>
    </div>
    <div class="building-zones" id="building-zones"></div>
  </div>
</div>

  <!-- ACCIONES -->
  <div class="action-bar">
    <div class="castigo-banner" id="castigo-banner"></div>
    <div class="instr" id="instr"></div>
    <div class="action-btns" id="action-btns"></div>
    <div class="log-line" id="log-line"></div>
  </div>

</div>

<!-- MODALES -->
<div class="modal-overlay" id="modal-ronda">
  <div class="modal">
    <h2 id="mr-title"></h2>
    <p id="mr-msg"></p>
    <div class="score-rows" id="mr-scores"></div>
    <div class="modal-btns">
      <button class="btn btn-gold" style="flex:1" id="btn-next-round" onclick="ackRonda()">Siguiente Ronda →</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-juego">
  <div class="modal">
    <h2>🎉 ¡Juego Terminado!</h2>
    <p>Resultados finales:</p>
    <div class="score-rows" id="mj-scores"></div>
    <div class="modal-btns">
      <button class="btn btn-gold" style="flex:1" onclick="location.href='/'">Nueva Partida</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-disconnected" style="z-index:250">
  <div class="modal" style="text-align:center">
    <h2>📡 Reconectando</h2>
    <p>Perdiste conexión. Intentando reconectar<span style="animation:dots 1.2s infinite">...</span></p>
  </div>
</div>

<div id="toast"></div>

<script src="js/socket.js"></script>
<script src="js/animations.js"></script>
<script src="js/dragdrop.js"></script>
<script src="js/game.js"></script>
</body>
</html>
