<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesca</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --fish:     #00c8e0;
            --fish-dim: rgba(0,200,224,.45);
            --fish-bg:  rgba(0,200,224,.1);
            --fish-bd:  rgba(0,200,224,.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(ellipse at 50% 0%, #0d3d54 0%, #041520 100%);
            min-height: 100vh; color: #e8e8e8; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        /* ── HEADER ── */
        #header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 14px; background: rgba(0,0,0,.4);
            border-bottom: 1px solid var(--fish-dim); backdrop-filter: blur(8px);
            position: sticky; top: 0; z-index: 100; gap: 8px;
        }
        .h-title {
            font-family: 'Cormorant Garamond', serif; font-size: 1.25rem;
            color: var(--fish); letter-spacing: 3px; white-space: nowrap;
        }
        #turn-pill {
            font-size: .72rem; padding: 4px 12px; border-radius: 20px;
            background: var(--fish-bg); border: 1px solid var(--fish-bd);
            color: var(--fish); transition: all .3s; white-space: nowrap; text-align: center;
        }
        #turn-pill.my-turn {
            background: rgba(0,200,224,.25); border-color: var(--fish);
            animation: pulse-pill 1.4s infinite;
        }
        @keyframes pulse-pill {
            0%,100% { box-shadow: 0 0 0 0 rgba(0,200,224,.45); }
            50%      { box-shadow: 0 0 0 6px rgba(0,200,224,0); }
        }
        .h-mazo { font-size: .7rem; color: var(--fish-dim); white-space: nowrap; }

        /* ── CHAT TOGGLE ── */
        #chat-toggle {
            position: relative; background: rgba(0,200,224,.08);
            border: 1px solid rgba(0,200,224,.25); border-radius: 8px;
            color: var(--fish); font-size: .75rem; padding: 4px 10px;
            cursor: pointer; white-space: nowrap; transition: background .15s;
        }
        #chat-toggle:hover { background: rgba(0,200,224,.18); }
        #chat-badge {
            position: absolute; top: -5px; right: -5px;
            background: #e74c3c; color: #fff; font-size: .55rem;
            border-radius: 50%; width: 14px; height: 14px;
            display: none; align-items: center; justify-content: center; font-weight: 700;
        }
        #chat-badge.show { display: flex; }

        /* ── CHAT PANEL ── */
        #chat-panel {
            position: fixed; bottom: 0; right: 0;
            width: min(320px, 100vw); max-height: 420px;
            background: rgba(4,21,32,.97); border: 1px solid var(--fish-bd);
            border-radius: 14px 0 0 0; z-index: 300;
            display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform .25s ease;
            box-shadow: -4px -4px 20px rgba(0,0,0,.5);
        }
        #chat-panel.open { transform: translateY(0); }
        #chat-panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px 8px; border-bottom: 1px solid rgba(0,200,224,.15);
            font-size: .75rem; color: var(--fish); font-weight: 600;
        }
        #chat-close { background: none; border: none; color: rgba(200,200,200,.5); cursor: pointer; font-size: 1rem; padding: 0 2px; }
        #chat-close:hover { color: #e8e8e8; }
        #emoji-grid {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 10px 12px 8px; border-bottom: 1px solid rgba(0,200,224,.1);
        }
        .emoji-btn {
            background: rgba(0,200,224,.07); border: 1px solid rgba(0,200,224,.18);
            border-radius: 8px; padding: 5px 10px; font-size: .82rem;
            cursor: pointer; transition: background .12s, transform .1s; color: #e8e8e8;
        }
        .emoji-btn:hover  { background: rgba(0,200,224,.2); transform: scale(1.1); }
        .emoji-btn:active { transform: scale(.93); }
        #chat-messages {
            flex: 1; overflow-y: auto; padding: 8px 12px;
            display: flex; flex-direction: column; gap: 4px; min-height: 80px;
            scrollbar-width: thin; scrollbar-color: var(--fish-dim) transparent;
        }
        .chat-msg { font-size: .72rem; line-height: 1.4; }
        .chat-msg .cn { color: var(--fish); font-weight: 600; margin-right: 4px; }
        .chat-msg .ct { color: rgba(220,220,220,.75); }
        #chat-input-row {
            display: flex; gap: 6px; padding: 8px 10px;
            border-top: 1px solid rgba(0,200,224,.1);
        }
        #chat-input {
            flex: 1; background: rgba(0,200,224,.06); border: 1px solid rgba(0,200,224,.2);
            border-radius: 8px; padding: 6px 10px; font-size: .75rem;
            color: #e8e8e8; font-family: 'Outfit', sans-serif; outline: none;
        }
        #chat-input::placeholder { color: rgba(200,200,200,.3); }
        #chat-send {
            background: var(--fish-bg); border: 1px solid var(--fish-bd);
            border-radius: 8px; padding: 6px 12px; color: var(--fish); font-size: .75rem; cursor: pointer;
        }
        #chat-send:hover { background: rgba(0,200,224,.22); }

        /* ── SPEECH BUBBLES ── */
        .speech-bubble {
            position: absolute; bottom: calc(100% + 6px); left: 50%;
            transform: translateX(-50%);
            background: rgba(10,30,45,.95); border: 1px solid var(--fish-bd);
            border-radius: 10px; padding: 5px 10px;
            font-size: .72rem; color: #e8e8e8;
            pointer-events: none; z-index: 200;
            animation: bubblePop .2s ease both;
            max-width: 160px; white-space: normal; text-align: center;
        }
        .speech-bubble::after {
            content: ''; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: rgba(10,30,45,.95);
        }
        @keyframes bubblePop {
            from { opacity:0; transform: translateX(-50%) scale(.8); }
            to   { opacity:1; transform: translateX(-50%) scale(1); }
        }
        #my-bubble-anchor { position: relative; }
        #my-bubble-anchor .speech-bubble {
            bottom: auto; top: calc(100% + 6px);
        }
        #my-bubble-anchor .speech-bubble::after {
            top: auto; bottom: 100%;
            border-top-color: transparent;
            border-bottom-color: rgba(10,30,45,.95);
        }

        /* ── EMOJI FLOTANTE ── */
        .reaction-float {
            position: fixed; font-size: 1.8rem; pointer-events: none; z-index: 9999;
            animation: floatUp 1.6s ease-out forwards;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            80%  { opacity: .8; }
            100% { opacity: 0; transform: translateY(-120px) scale(1.3); }
        }

        /* ── RIVALES ── */
        #rivals-area {
            display: flex; flex-wrap: wrap; gap: 8px;
            padding: 10px 12px 6px; justify-content: center;
        }
        .rival-card {
            background: rgba(0,0,0,.3); border: 1px solid rgba(0,200,224,.14);
            border-radius: 12px; padding: 8px 12px;
            min-width: 110px; max-width: 175px; flex: 1;
            transition: all .2s; cursor: default; position: relative;
        }
        .rival-card.selectable   { cursor: pointer; border-color: var(--fish-bd); }
        .rival-card.selectable:hover { background: var(--fish-bg); border-color: var(--fish); transform: translateY(-2px); }
        .rival-card.selected     { background: rgba(0,200,224,.15); border-color: var(--fish); box-shadow: 0 0 12px rgba(0,200,224,.3); }
        .rival-card.inactive     { opacity: .4; pointer-events: none; }
        .rival-card.being-asked  { animation: ask-blink .5s ease-in-out infinite alternate; }
        @keyframes ask-blink {
            from { border-color: rgba(255,200,0,.3); }
            to   { border-color: rgba(255,200,0,.9); box-shadow: 0 0 14px rgba(255,200,0,.3); }
        }
        .r-name {
            font-size: .8rem; font-weight: 600; margin-bottom: 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: flex; align-items: center; gap: 5px;
        }
        .r-dot { width: 6px; height: 6px; border-radius: 50%; background: #2ecc71; flex-shrink: 0; }
        .r-dot.away { background: #555; }
        .r-stats { font-size: .65rem; color: rgba(200,200,200,.55); margin-bottom: 5px; display: flex; gap: 8px; }
        .r-jugadas { display: flex; flex-wrap: wrap; gap: 3px; }
        .r-jugada-badge {
            background: var(--fish-bg); border: 1px solid var(--fish-bd);
            border-radius: 4px; padding: 2px 6px;
            font-size: .65rem; color: var(--fish);
            font-family: 'Cormorant Garamond', serif; font-weight: 700;
        }
        .rival-turno-dot {
            position: absolute; top: 7px; right: 7px;
            width: 7px; height: 7px; border-radius: 50%; background: #ffe066;
            box-shadow: 0 0 6px rgba(255,220,0,.6);
        }

        /* ── PETICIÓN ACTIVA ── */
        #peticion-wrap { padding: 0 12px 4px; display: flex; justify-content: center; }
        #peticion-box {
            display: none; background: rgba(0,0,0,.55); border: 2px solid var(--fish);
            border-radius: 14px; padding: 12px 18px; text-align: center;
            max-width: 440px; width: 100%; box-shadow: 0 0 20px rgba(0,200,224,.2);
        }
        #peticion-box.show { display: block; }
        #pet-texto { font-size: .9rem; line-height: 1.5; margin-bottom: 8px; }
        #pet-texto strong { color: var(--fish); }
        .v-hi { font-size: 1.15em; color: #ffe066; font-family:'Cormorant Garamond',serif; font-weight:700; }
        #pet-timer-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #pet-timer { font-size: 1.5rem; font-family:'Cormorant Garamond',serif; color: var(--fish); font-weight:700; min-width:2ch; }
        #pet-timer.urgent { color: #ff6b6b; animation: urgent-pulse .35s infinite alternate; }
        @keyframes urgent-pulse { to { opacity: .4; } }
        #btn-confirmar {
            padding: 6px 16px; border-radius: 8px; background: var(--fish-bg);
            border: 1px solid var(--fish-bd); color: var(--fish); font-size: .8rem;
            font-family: 'Outfit', sans-serif; cursor: pointer; transition: background .15s; display: none;
        }
        #btn-confirmar:hover { background: rgba(0,200,224,.25); }

        /* ── SLOTS ── */
        #slots-section { padding: 6px 10px 4px; }
        .slots-lbl { font-size: .62rem; color: var(--fish-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; padding-left:2px; }
        .building-row {
            display: flex; gap: 6px; justify-content: center; align-items: flex-start;
            width: 100%; overflow-x: auto; overflow-y: visible; padding: 0 2px;
            min-height: calc(var(--ch,72px) + 28px);
            scrollbar-width: thin; scrollbar-color: var(--fish-dim) transparent;
        }
        .building-slot {
            flex: 1 1 auto;
            min-width: calc(var(--cw,52px) * 3 + 16px);
            max-width: calc(var(--cw,52px) * 6 + 36px);
            display: flex; flex-direction: column;
            background: rgba(0,0,0,.22); border: 2px solid rgba(0,200,224,.18);
            border-radius: 6px; padding: 3px;
            transition: border-color .2s, background .2s; overflow: visible; cursor: pointer;
        }
        .building-slot:hover    { border-color: var(--fish); background: rgba(0,200,224,.06); }
        .building-slot.complete { border-color: #2ecc71 !important; background: rgba(46,204,113,.08); }
        .building-slot.sel-slot { border-color: #ffe066 !important; background: rgba(255,220,0,.07); box-shadow: 0 0 10px rgba(255,220,0,.2); }
        .building-slot.drag-over { border-color: var(--fish) !important; background: rgba(0,200,224,.18) !important; box-shadow: 0 0 16px rgba(0,200,224,.35); }
        .slot-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1px; padding:0 2px; font-size:.58rem; flex-shrink:0; }
        .slot-title  { color: var(--fish); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
        .slot-count  { font-size:.5rem; color:rgba(255,255,255,.4); background:rgba(0,0,0,.3); padding:1px 4px; border-radius:6px; }
        .slot-count.valid { color: #2ecc71; background: rgba(46,204,113,.2); }
        .slot-cards {
            display: flex; gap: 2px; flex-wrap: wrap;
            align-items: flex-start; justify-content: center;
            padding: 2px; overflow: visible;
            min-height: calc(var(--ch,72px) + 4px); width: 100%;
        }

        /* ── MI ÁREA ── */
        #my-area {
            background: rgba(0,0,0,.3); border-top: 1px solid rgba(0,200,224,.1);
            padding: 10px 12px 14px; margin-top: auto;
        }
        #my-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
        #my-name-lbl  { font-size:.78rem; color:var(--fish); font-weight:600; }
        #my-jugadas-lbl { font-size:.68rem; color:var(--fish-dim); }
        #my-jugadas { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:6px; min-height:0; }
        .my-jugada-pill {
            background:var(--fish-bg); border:1px solid var(--fish-bd);
            border-radius:20px; padding:3px 10px; font-size:.75rem;
            font-family:'Cormorant Garamond',serif; font-weight:700;
            color:var(--fish); display:flex; align-items:center; gap:4px;
        }
        .pill-sub { font-size:.58rem; color:var(--fish-dim); }

        /* ── DAME HINT ── */
        #dame-hint {
            display: none; background: rgba(255,220,0,.1); border: 1px solid rgba(255,220,0,.35);
            border-radius: 8px; padding: 6px 14px; font-size: .78rem; color: #ffe066;
            text-align: center; margin-bottom: 6px;
        }
        #dame-hint.show { display: block; }

        /* ── MANO ── */
        #my-bubble-anchor { position: relative; }
        #my-hand { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-bottom:10px; }

        /* ── CARTA ── */
        .p-card {
            width: var(--cw,52px); height: var(--ch,72px);
            background: #f9f5eb; border-radius: 7px; border: 2px solid transparent;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size:.82rem; font-weight:700; font-family:'Cormorant Garamond',serif;
            color:#222; cursor:grab; transition: transform .15s, border-color .15s, box-shadow .15s;
            user-select:none; flex-shrink:0; position:relative;
        }
        .p-card:active { cursor: grabbing; }
        .p-card.red   { color: #c0392b; }
        .p-card.joker { background: #2a0d4a; color: #ffe066; border-color: rgba(140,60,200,.3); }
        .p-card:hover { transform: translateY(-4px); }
        .p-card.selectable:hover { border-color: var(--fish); box-shadow: 0 4px 12px rgba(0,200,224,.35); }
        .p-card.selected {
            transform: translateY(-9px) !important;
            border-color: #ffe066 !important;
            box-shadow: 0 6px 16px rgba(255,220,0,.5) !important;
        }
        .p-card.dragging { opacity: .3; transform: none !important; pointer-events: none; }
        .cv { font-size:.72rem; line-height:1; }
        .cp { font-size:.88rem; line-height:1; }

        /* ── ACCIONES ── */
        #actions-area { display:flex; flex-direction:column; gap:6px; }
        #hint-line { font-size:.7rem; color:rgba(0,200,224,.6); text-align:center; min-height:16px; }
        #action-btns { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; }
        .abtn {
            padding: 8px 16px; border-radius:8px; font-size:.8rem;
            cursor:pointer; font-family:'Outfit',sans-serif;
            transition:background .15s, transform .1s; border:1px solid transparent;
        }
        .abtn:active { transform:scale(.96); }
        .abtn-primary { background:var(--fish-bg); border-color:var(--fish-bd); color:var(--fish); }
        .abtn-primary:hover { background:rgba(0,200,224,.22); }
        .abtn-cancel  { background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.1); color:rgba(200,200,200,.6); }
        .abtn-cancel:hover { background:rgba(255,255,255,.1); color:#e8e8e8; }
        .abtn-green   { background:rgba(46,204,113,.12); border-color:rgba(46,204,113,.35); color:#2ecc71; }
        .abtn-green:hover { background:rgba(46,204,113,.22); }

        /* ── MODAL FIN ── */
        #fin-modal { display:none; position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.75); backdrop-filter:blur(8px); align-items:center; justify-content:center; }
        #fin-modal.show { display:flex; }
        .fin-box { background:linear-gradient(160deg,#0a2a3a,#041520); border:2px solid var(--fish); border-radius:18px; padding:26px 22px; width:min(360px,92%); text-align:center; box-shadow:0 0 40px rgba(0,200,224,.2); }
        .fin-box h2 { font-family:'Cormorant Garamond',serif; font-size:1.6rem; color:var(--fish); margin-bottom:16px; letter-spacing:2px; }
        .result-row { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; margin-bottom:5px; background:rgba(255,255,255,.04); }
        .result-row.winner { background:var(--fish-bg); border:1px solid var(--fish-bd); }
        .result-rank { font-size:.85rem; color:rgba(200,200,200,.5); width:24px; }
        .result-name { flex:1; text-align:left; font-size:.88rem; }
        .result-score { font-size:.8rem; color:var(--fish); font-family:'Cormorant Garamond',serif; font-weight:700; }

        /* ── TOAST ── */
        #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(180,50,50,.9); color:#fff; padding:8px 18px; border-radius:8px; font-size:.8rem; display:none; z-index:999; white-space:nowrap; max-width:90vw; }
        #toast.show  { display:block; }
        #toast.green { background:rgba(40,160,80,.9); }
        #toast.fish  { background:rgba(0,140,160,.9); }

        /* ── HAND drag-over highlight ── */
        #my-hand.drag-over { background: rgba(0,200,224,.08); border-radius: 8px; outline: 2px dashed var(--fish-bd); }

        @media (max-width:480px) {
            :root { --cw:42px; --ch:58px; }
            .building-slot { min-width:calc(var(--cw)*2 + 12px); }
        }
    </style>
</head>
<body>

<div id="header">
    <div class="h-title">🎣 Pesca</div>
    <div id="turn-pill">—</div>
    <div class="h-mazo">🃏 <span id="mazo-count">—</span></div>
    <button id="chat-toggle" onclick="toggleChat()">💬 Chat <span id="chat-badge"></span></button>
</div>

<div id="rivals-area"></div>

<div id="peticion-wrap">
    <div id="peticion-box">
        <div id="pet-texto"></div>
        <div id="pet-timer-row">
            <div id="pet-timer">5</div>
            <button id="btn-confirmar" onclick="confirmarRespuesta()">✅ Listo</button>
        </div>
    </div>
</div>

<!-- log oculto: el JS lo sigue llenando pero no se muestra -->
<div id="log-area" style="display:none"></div>

<div id="slots-section">
    <div class="slots-lbl">Jugadas en construcción</div>
    <div class="building-row" id="building-row">
        <div class="building-slot" data-slot="0" onclick="clickSlot(0)">
            <div class="slot-header">
                <span class="slot-title">Jugada 1</span>
                <span class="slot-count" id="slot-count-0">0/4</span>
            </div>
            <div class="slot-cards" id="slot-cards-0"></div>
        </div>
        <div class="building-slot" data-slot="1" onclick="clickSlot(1)">
            <div class="slot-header">
                <span class="slot-title">Jugada 2</span>
                <span class="slot-count" id="slot-count-1">0/4</span>
            </div>
            <div class="slot-cards" id="slot-cards-1"></div>
        </div>
        <div class="building-slot" data-slot="2" onclick="clickSlot(2)">
            <div class="slot-header">
                <span class="slot-title">Jugada 3</span>
                <span class="slot-count" id="slot-count-2">0/4</span>
            </div>
            <div class="slot-cards" id="slot-cards-2"></div>
        </div>
    </div>
</div>

<div id="my-area">
    <div id="my-header">
        <div id="my-name-lbl">Tu mano</div>
        <div id="my-jugadas-lbl"></div>
    </div>
    <div id="my-jugadas"></div>
    <div id="dame-hint"></div>
    <div id="my-bubble-anchor">
        <div id="my-hand"></div>
    </div>
    <div id="actions-area">
        <div id="hint-line"></div>
        <div id="action-btns"></div>
    </div>
</div>

<!-- CHAT PANEL -->
<div id="chat-panel">
    <div id="chat-panel-header">
        <span>💬 Chat &amp; Reacciones</span>
        <button id="chat-close" onclick="toggleChat()">✕</button>
    </div>
    <div id="emoji-grid">
        <button class="emoji-btn" onclick="sendReaction('emoji','😂')">😂</button>
        <button class="emoji-btn" onclick="sendReaction('emoji','😱')">😱</button>
        <button class="emoji-btn" onclick="sendReaction('emoji','🔥')">🔥</button>
        <button class="emoji-btn" onclick="sendReaction('emoji','👏')">👏</button>
        <button class="emoji-btn" onclick="sendReaction('emoji','😤')">😤</button>
        <button class="emoji-btn" onclick="sendReaction('emoji','🥳')">🥳</button>
        <button class="emoji-btn" onclick="sendReaction('texto','¡PAGA!')">💳 PAGA</button>
        <button class="emoji-btn" onclick="sendReaction('texto','¡Ya gané!')">🏆 Gané</button>
        <button class="emoji-btn" onclick="sendReaction('texto','¡Buena!')">👍 Buena</button>
        <button class="emoji-btn" onclick="sendReaction('texto','¡Suerte!')">🍀 Suerte</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
        <input id="chat-input" type="text" maxlength="60" placeholder="Escribe algo…"
               onkeydown="if(event.key==='Enter') sendChatMsg()">
        <button id="chat-send" onclick="sendChatMsg()">➤</button>
    </div>
</div>

<div id="fin-modal">
    <div class="fin-box">
        <h2>🏆 Fin del Juego</h2>

<!-- ═══════════════════════════════════
     CHAT + REACCIONES
════════════════════════════════════ -->
<script>
(function () {
    'use strict';
    let chatOpen    = false;
    let unreadCount = 0;

    window.toggleChat = function () {
        chatOpen = !chatOpen;
        document.getElementById('chat-panel').classList.toggle('open', chatOpen);
        if (chatOpen) {
            unreadCount = 0;
            const badge = document.getElementById('chat-badge');
            badge.classList.remove('show');
            badge.textContent = '';
            const msgs = document.getElementById('chat-messages');
            if (msgs) msgs.scrollTop = msgs.scrollHeight;
        }
    };

    function _getNombre() {
        const m = document.cookie.match(/(?:^|; )continental_nombre=([^;]*)/);
        return m ? decodeURIComponent(m[1]) : 'Jugador';
    }

    window.sendReaction = function (tipo, texto) {
        if (typeof WS === 'undefined') return;
        WS.send({ type: 'reaccion', reaction: { tipo, texto, nombre: _getNombre() } });
    };

    window.sendChatMsg = function () {
        const input = document.getElementById('chat-input');
        const txt   = (input.value || '').trim();
        if (!txt) return;
        sendReaction('texto', txt);
        input.value = '';
    };

    function _handleReaccion(data) {
        const { tipo, texto, nombre } = data;

        // Emoji flotante
        if (tipo === 'emoji') {
            const el = document.createElement('div');
            el.className = 'reaction-float';
            el.textContent = texto;
            el.style.left   = (15 + Math.random() * 65) + 'vw';
            el.style.bottom = '130px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1700);
        }

        // Speech bubble
        const bubble = document.createElement('div');
        bubble.className   = 'speech-bubble';
        bubble.textContent = texto;

        // Buscar rival por nombre
        let anchor = null;
        document.querySelectorAll('.rival-card .r-name').forEach(el => {
            if (el.textContent.trim().includes(nombre)) anchor = el.closest('.rival-card');
        });

        if (anchor) {
            anchor.appendChild(bubble);
        } else {
            const myAnchor = document.getElementById('my-bubble-anchor');
            if (myAnchor) myAnchor.appendChild(bubble);
        }
        setTimeout(() => bubble.remove(), 3200);

        // Agregar al panel de chat
        const msgs = document.getElementById('chat-messages');
        if (msgs) {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML  = `<span class="cn">${nombre}:</span><span class="ct"> ${texto}</span>`;
            msgs.appendChild(div);
            if (chatOpen) msgs.scrollTop = msgs.scrollHeight;
        }

        // Badge si panel cerrado
        if (!chatOpen) {
            unreadCount++;
            const badge = document.getElementById('chat-badge');
            badge.textContent = unreadCount > 9 ? '9+' : String(unreadCount);
            badge.classList.add('show');
        }
    }

    // Registrar listener una vez que WS esté listo
    function _registerWS() {
        if (typeof WS !== 'undefined') {
            WS.on('reaccion', _handleReaccion);
        } else {
            setTimeout(_registerWS, 100);
        }
    }
    _registerWS();
})();
</script>

<!-- ═══════════════════════════════════
     DRAG & DROP: mano ↔ slots
════════════════════════════════════ -->
<script>
(function () {
    'use strict';
    let dragId       = null;  // id carta arrastrada
    let dragFromSlot = null;  // índice de slot origen (null = mano)
    let ghost        = null;  // clone visual

    /* Expuesto para pesca.js al crear cartas */
    window._pescaDragStart = function (e, cardEl, cardId, fromSlot) {
        e.stopPropagation();
        dragId       = cardId;
        dragFromSlot = (fromSlot !== undefined && fromSlot !== null) ? fromSlot : null;

        cardEl.classList.add('dragging');

        // Clonar carta como fantasma
        ghost = cardEl.cloneNode(true);
        ghost.classList.remove('dragging', 'selected');
        ghost.style.cssText = [
            'position:fixed', 'z-index:9000', 'pointer-events:none',
            'opacity:.88', 'transform:rotate(5deg) scale(1.1)',
            'box-shadow:0 10px 28px rgba(0,0,0,.55)', 'transition:none'
        ].join(';');
        document.body.appendChild(ghost);

        const pt = e.touches ? e.touches[0] : e;
        _posGhost(pt.clientX, pt.clientY);

        if (e.type === 'mousedown') {
            document.addEventListener('mousemove', _onMove);
            document.addEventListener('mouseup',   _onUp);
        } else {
            document.addEventListener('touchmove', _onTMove, { passive: false });
            document.addEventListener('touchend',  _onTEnd);
        }
    };

    /* Funciones de drop expuestas para pesca.js */
    window._pescaDropToSlot = function (cardId, slotIdx) {
        // Simula click en slot con carta seleccionada de mano
        // pesca.js ya tiene clickSlot() que hace esto
        if (typeof clickCardDropOnSlot === 'function') {
            clickCardDropOnSlot(cardId, slotIdx);
        }
    };
    window._pescaMoveSlotToSlot = function (cardId, fromSlot, toSlot) {
        if (typeof pescaMoveSlotToSlot === 'function') {
            pescaMoveSlotToSlot(cardId, fromSlot, toSlot);
        }
    };
    window._pescaReturnToHand = function (cardId, fromSlot) {
        if (typeof pescaReturnToHand === 'function') {
            pescaReturnToHand(cardId, fromSlot);
        }
    };

    function _posGhost(x, y) {
        if (!ghost) return;
        const cw = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cw')) || 52;
        const ch = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ch')) || 72;
        ghost.style.left = (x - cw / 2) + 'px';
        ghost.style.top  = (y - ch / 2) + 'px';
    }

    function _onMove(e)  { _posGhost(e.clientX, e.clientY); _hl(e.clientX, e.clientY); }
    function _onTMove(e) { e.preventDefault(); const t = e.touches[0]; _posGhost(t.clientX, t.clientY); _hl(t.clientX, t.clientY); }
    function _onUp(e)    { _drop(e.clientX, e.clientY); _cleanup(); }
    function _onTEnd(e)  { const t = e.changedTouches[0]; _drop(t.clientX, t.clientY); _cleanup(); }

    function _hl(x, y) {
        document.querySelectorAll('.building-slot').forEach(s => s.classList.remove('drag-over'));
        document.getElementById('my-hand')?.classList.remove('drag-over');
        ghost.style.display = 'none';
        const under = document.elementFromPoint(x, y);
        ghost.style.display = '';
        if (!under) return;
        const slot = under.closest('.building-slot');
        if (slot) { slot.classList.add('drag-over'); return; }
        if (dragFromSlot !== null) {
            const hand = document.getElementById('my-hand');
            const area = document.getElementById('my-area');
            if (hand && (hand === under || hand.contains(under))) hand.classList.add('drag-over');
            else if (area && (area === under || area.contains(under)) && !under.closest('.building-slot')) hand.classList.add('drag-over');
        }
    }

    function _drop(x, y) {
        if (dragId === null) return;
        ghost.style.display = 'none';
        const under = document.elementFromPoint(x, y);
        ghost.style.display = '';
        if (!under) return;

        const slot = under.closest('.building-slot');
        if (slot) {
            const idx = parseInt(slot.dataset.slot);
            if (dragFromSlot !== null) {
                if (dragFromSlot !== idx) window._pescaMoveSlotToSlot(dragId, dragFromSlot, idx);
            } else {
                window._pescaDropToSlot(dragId, idx);
            }
            return;
        }

        // Volver a mano si viene de slot
        if (dragFromSlot !== null) {
            const hand = document.getElementById('my-hand');
            const area = document.getElementById('my-area');
            const inHand = hand && (hand === under || hand.contains(under));
            const inArea = area && (area === under || area.contains(under)) && !under.closest('.building-slot') && !under.closest('#slots-section');
            if (inHand || inArea) window._pescaReturnToHand(dragId, dragFromSlot);
        }
    }

    function _cleanup() {
        document.querySelectorAll('.p-card.dragging').forEach(c => c.classList.remove('dragging'));
        document.querySelectorAll('.building-slot').forEach(s => s.classList.remove('drag-over'));
        document.getElementById('my-hand')?.classList.remove('drag-over');
        if (ghost) { ghost.remove(); ghost = null; }
        document.removeEventListener('mousemove', _onMove);
        document.removeEventListener('mouseup',   _onUp);
        document.removeEventListener('touchmove', _onTMove);
        document.removeEventListener('touchend',  _onTEnd);
        dragId = null; dragFromSlot = null;
    }
})();
</script>
